name: GitHub Readme Stats Action

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repositori
        uses: actions/checkout@v3

      - name: Generate Stats & Languages
        uses: stats-organization/github-readme-stats-action@v1
        with:
          gh_token: ${{ secrets.GITHUB_TOKEN }}
          user: raditted
          theme: vue
          show_icons: true
          output_dir: generated_stats
          include_all_commits: true
          count_private: true

      - name: Commit & Push
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@://github.com'
          git add .
          git commit -m "Update GitHub Stats & Languages" || echo "No changes to commit"
          git push
